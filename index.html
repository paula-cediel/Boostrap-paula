<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Card Personal</title>

  <!-- Bootstrap -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link 
    rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
  >

  <!-- Tu CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow" style="width: 22rem;">

      <!-- FOTO -->
      <img src="mi-foto.jpg" class="card-img-top" alt="Mi imagen">

      <div class="card-body text-center">
        
        <!-- NOMBRE -->
        <h3 class="card-title">Paula cediel</h3>
        
        <!-- ROL -->
        <h6 class="text-primary">Desarrolladora fullstack</h6>

        <!-- DESCRIPCIÓN -->
        <p class="card-text mt-3">
        Soy una desarrolladora fullstack apasionada por crear soluciones innovadoras y eficientes. Me encanta aprender nuevas tecnologías y enfrentar desafíos que me permitan crecer profesionalmente.
        </p>

        <!-- BOTONES / REDES -->
        <div class="d-flex justify-content-center gap-3">
          <a href="#" class="btn btn-outline-primary">
            <i class="bi bi-envelope"></i>
          </a>
          <a href="#" class="btn btn-outline-dark">
            <i class="bi bi-github"></i>
          </a>
          <a href="#" class="btn btn-outline-info">
            <i class="bi bi-linkedin"></i>
          </a>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
